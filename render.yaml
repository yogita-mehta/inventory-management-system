services:
  # The API Service
  - type: web
    name: inventory-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:api
    envVars:
      - key: PORT
        value: 4100
      - key: REDIS_URL
        fromService:
          name: inventory-redis
          type: redis
          property: connectionString

  # The Dashboard Service
  - type: web
    name: inventory-dashboard
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:dashboard
    envVars:
      - key: PORT
        value: 5100
      - key: REDIS_URL
        fromService:
          name: inventory-redis
          type: redis
          property: connectionString

  # The Inventory Worker (Background Worker)
  # Note: Render free tier doesn't support background workers.
  # For demo purposes, we might want to combine these or mention they need a paid plan.
  - type: worker
    name: inventory-worker
    env: node
    plan: starter # Workers require at least starter plan on Render
    buildCommand: npm install
    startCommand: node src/workers/inventoryWorker.js
    envVars:
      - key: REDIS_URL
        fromService:
          name: inventory-redis
          type: redis
          property: connectionString

  # The Order Worker (Background Worker)
  - type: worker
    name: inventory-order-worker
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node src/workers/orderWorker.js
    envVars:
      - key: REDIS_URL
        fromService:
          name: inventory-redis
          type: redis
          property: connectionString

# Redis Database
databases:
  - name: inventory-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
