services:
  # Monolithic All-in-One Service (Compatible with Render Free Tier)
  - type: web
    name: inventory-monolith
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/monolith.js
    envVars:
      - key: REDIS_URL
        fromService:
          name: inventory-redis
          type: redis
          property: connectionString

# Redis Database (Free Tier)
databases:
  - name: inventory-redis
    plan: free
