services:
  # Monolithic All-in-One Service (Compatible with Render Free Tier)
  - type: web
    name: inventory-monolith
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/monolith.js
    envVars:
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: inventory-redis
          property: connectionString

  # Managed Redis Instance (Free Tier)
  - type: keyvalue
    name: inventory-redis
    plan: free
    ipAllowList: [] # Allows all internal Render traffic
